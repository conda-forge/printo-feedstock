schema_version: 1

context:
  name: printo
  version: "0.0.16"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/printo-${{ version }}.tar.gz
  sha256: e89d1ad629745adfd215f3adcdcb565b26c39a5a1b00d6d7ca595a4c7abdb3b3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - sigmatch >=0.0.8
    - getsources >=0.0.3

tests:
  - python:
      imports:
        - printo
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Print objects with data beautifully
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pomponchik/printo

extra:
  recipe-maintainers:
    - thewchan
