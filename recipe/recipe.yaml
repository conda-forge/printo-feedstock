schema_version: 1

context:
  name: printo
  version: "0.0.28"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/printo-${{ version }}.tar.gz
  sha256: 351a5cbf192e404b5be1e572916cf3760861f2600ed0a3b525ac1441053d53ad

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - sigmatch >=0.0.10
    - getsources >=0.0.4

tests:
  - python:
      imports:
        - printo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Print objects with data beautifully
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pomponchik/printo

extra:
  recipe-maintainers:
    - thewchan
